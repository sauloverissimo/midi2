## ESP-IDF Component Manager manifest.
##
## Lets ESP-IDF projects pull midi2 directly from GitHub without
## vendoring src/dist into the consumer tree:
##
##   # in your_app/main/idf_component.yml
##   dependencies:
##     midi2:
##       git: https://github.com/sauloverissimo/midi2.git
##       version: ">=0.3.3"
##
## The Component Manager clones midi2 into managed_components/, and
## ESP-IDF picks it up as a component because the top-level CMakeLists
## detects ESP_PLATFORM and calls idf_component_register at the top of
## the file.

description: "Portable MIDI 2.0 UMP library, C99 with zero dependencies and zero allocation."
version: "0.3.3"
url: "https://github.com/sauloverissimo/midi2"
documentation: "https://github.com/sauloverissimo/midi2#readme"
issues: "https://github.com/sauloverissimo/midi2/issues"
license: "MIT"
maintainers:
  - "Saulo Verissimo <sauloverissimo@gmail.com>"
tags:
  - midi
  - midi2
  - ump
  - capability-inquiry
  - property-exchange

dependencies:
  idf: ">=4.0"
