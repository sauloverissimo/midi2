# midi2 library (Zephyr module)
CONFIG_MIDI2=y

# Zephyr USB device stack + MIDI 2.0 class
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_MIDI2_CLASS=y

# Zephyr-built-in UMP Stream responder. Handles Endpoint Discovery,
# FB Discovery, FB Info, Endpoint Name and Product Instance ID from the
# zephyr,midi2-device devicetree node. We layer MIDI-CI + Channel Voice
# + Flex Data on top via midi2.
CONFIG_MIDI2_UMP_STREAM_RESPONDER=y

# Entropy for MIDI-CI MUID. RP2040 has no on-chip TRNG so we use
# software-mixed sources via Zephyr's sys_rand* API.
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Logging via USB CDC console would race with the MIDI device on the
# same USB-C; pin LOG output to printk and keep CDC ACM out of the boot
# path.
CONFIG_LOG=y
CONFIG_LOG_PRINTK=y
CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
